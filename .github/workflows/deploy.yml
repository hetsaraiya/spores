name: build-and-deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # build provenance attestation
    outputs:
      pushed: ${{ steps.gate.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4

      # GHCR image names must be lowercase; github.repository may not be.
      - name: Compute image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Classic PAT with write:packages if GHCR_PAT is set; else built-in token.
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          # hetnanu is aarch64; amd64 kept for local runs and portability.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Mark image as pushed
        id: gate
        if: github.event_name != 'pull_request'
        run: echo "pushed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    # Only redeploy for real pushes to the default branch, not PRs.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hetnanu deploy-hook
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "DEPLOY_TOKEN secret not set — image is published, skipping remote redeploy." >&2
            exit 0
          fi
          curl -fsS -X POST \
            "https://deploy.hetsaraiya.com/hooks/deploy?service=spore" \
            -H "X-Deploy-Token: $DEPLOY_TOKEN"
